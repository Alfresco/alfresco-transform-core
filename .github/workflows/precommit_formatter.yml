name: Pre-Commit formatter

on:
  push:
    branches:
      - precommit/**

permissions:
  contents: read

jobs:
  format-code:
    name: "Reformat code"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: contains(github.event.head_commit.message, '[reformat code]')
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.9"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        continue-on-error: true
        with:
          extra_args: --all-files
      - name: Update secrets baseline
        run: pip install detect-secrets && detect-secrets scan --baseline .secrets.baseline
      - uses: Alfresco/alfresco-build-tools/.github/actions/git-commit-changes@v18.21.0
        with:
          username: ${{ secrets.BOT_GITHUB_USERNAME }}
          add-options: -u
          commit-message: "Apply Pre-Commit code formatting"
          skip-if-no-changes: true
      - name: Push changes
        run: git push
